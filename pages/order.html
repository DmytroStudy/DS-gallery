<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSgallery — Order</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="d-flex flex-column" style="min-height:100vh">

  <!-- Header -->
  <nav class="navbar px-4 py-2 border-bottom sticky-top bg-white d-flex justify-content-between">
    <a href="home.html"><img src="../images/home/logo.png" alt="DSgallery" style="max-height:40px"/></a>
    <div class="d-flex align-items-center gap-2">
      <div class="search-wrap">
        <input type="text" placeholder="Search"/>
        <img class="icon-search" src="../icons/search.svg" alt=""/>
      </div>
      <a class="icon-btn" href="cart.html"><img src="../icons/cart.svg" alt="Cart"/></a>
      <a class="icon-btn" href="saved.html"><img src="../icons/bookmark.svg" alt="Saved"/></a>
      <a class="log-btn" href="login.html">Log in</a>
      <a class="log-btn" href="register.html">Register</a>
    </div>
  </nav>

  <!-- Body -->
  <div class="d-flex flex-grow-1">

    <!-- Sidebar -->
    <aside>
      <nav>
        <a class="side-link" href="home.html">Home</a>
        <a class="side-link" href="artworks.html">Artworks</a>
        <a class="side-link" href="artists.html">Artists</a>
      </nav>
    </aside>

    <!-- PAGE: ORDER -->
    <main class="p-4 p-md-5 overflow-y-auto flex-grow-1">
      <h1>Order</h1>
      <div class="row g-5">

        <section class="col-12 col-md-6">
          <h2 class="fw-500 fs-6 mb-4">Shipping information</h2>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Full Name</label>
            <input class="form-control" type="text" placeholder="Willem Dafoe"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Card</label>
            <input class="form-control mb-2" type="text" placeholder="1234 1234 1234 1234"/>
            <div class="row g-2">
              <div class="col-6"><input class="form-control" type="text" placeholder="MM/YY"/></div>
              <div class="col-6"><input class="form-control" type="text" placeholder="CVV"/></div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Location</label>
            <select class="form-select">
              <option>Select country</option>
              <option>Slovakia</option>
              <option>Czech Republic</option>
              <option>Austria</option>
              <option>Germany</option>
              <option>Hungary</option>
            </select>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="terms-check" checked/>
            <label class="form-check-label" for="terms-check">I accept the terms</label>
          </div>
          <a class="btn btn-dark w-100 mt-3" href="home.html">Confirm payment</a>
        </section>

        <section class="col-12 col-md-6">
          <h2 class="fw-500 fs-6 mb-4">Your cart: 4579€</h2>
          <div class="row row-cols-2 g-2">

            <div class="col">
              <div class="border rounded-1 overflow-hidden">
                <div class="img-ph" style="height:130px">
                  <img class="art-image" src="../images/art/van_gogh/Bridges_across_the_Seine_at_Asnieres.jpg" alt=""/>
                </div>
                <div class="tile-info">
                  <div class="name">Bridges Across the Seine</div>
                  <div class="price">879€</div>
                </div>
              </div>
            </div>

            <div class="col">
              <div class="border rounded-1 overflow-hidden">
                <div class="img-ph" style="height:130px">
                  <img class="art-image" src="../images/art/van_gogh/Cafe_Terrace_at_Night.jpg" alt=""/>
                </div>
                <div class="tile-info">
                  <div class="name">Café Terrace at Night</div>
                  <div class="price">950€</div>
                </div>
              </div>
            </div>

            <div class="col">
              <div class="border rounded-1 overflow-hidden">
                <div class="img-ph" style="height:130px">
                  <img class="art-image" src="../images/art/van_gogh/Fishing_in_the_Spring.jpg" alt=""/></div>
                <div class="tile-info"><div class="name">Fishing in the Spring</div>
                  <div class="price">880€</div>
                </div>
              </div>
            </div>

            <div class="col">
              <div class="border rounded-1 overflow-hidden">
                <div class="img-ph" style="height:130px">
                  <img class="art-image" src="../images/art/van_gogh/Fritillaries_in_a_Copper_Vase.jpg" alt=""/></div>
                <div class="tile-info"><div class="name">Fritillaries in a Copper Vase</div>
                  <div class="price">1000€</div>
                </div>
              </div>
            </div>

            <div class="col">
              <div class="border rounded-1 overflow-hidden">
                <div class="img-ph" style="height:130px">
                  <img class="art-image" src="../images/art/van_gogh/Interior_of_a_Restaurant.jpg" alt=""/></div>
                <div class="tile-info">
                  <div class="name">Interior of a Restaurant</div>
                  <div class="price">870€</div>
                </div>
              </div>
            </div>

          </div>
        </section>


      </div>
    </main>

  </div>

  <!-- Footer -->
  <footer class="d-flex align-items-center gap-3 py-3 border-top" style="background:var(--card-bg); padding-left:1.5rem; padding-right:1.5rem">
    <div class="d-flex gap-3">
      <a href="#" class="opacity-50"><img src="../icons/twitter.svg" alt="Twitter" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/instagram.svg" alt="Instagram" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/youtube.svg" alt="YouTube" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/linkedin.svg" alt="LinkedIn" style="width:15px; height:15px"/></a>
    </div>
    <p class="mb-0 text-muted small">© 2026 DSgallery. All rights reserved.</p>
  </footer>

</body>
</html>
