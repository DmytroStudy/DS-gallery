<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSgallery: cart_payment</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="d-flex flex-column" style="min-height:100vh">

  <!-- Header -->
  <nav class="navbar px-4 py-2 border-bottom sticky-top bg-white d-flex justify-content-between">
    <a href="home.html"><img src="../images/home/logo.png" alt="DSgallery" style="max-height:40px"/></a>
    <div class="d-flex align-items-center gap-2">
      <div class="search-wrap">
        <input type="text" placeholder="Search"/>
        <img class="icon-search" src="../icons/search.svg" alt=""/>
      </div>
      <a class="mid-icon-btn" href="cart.html"><img src="../icons/cart.svg" alt="Cart"/></a>
      <a class="mid-icon-btn" href="saved.html"><img src="../icons/bookmark.svg" alt="Saved"/></a>
      <a class="mid-btn" href="login.html">Log in</a>
      <a class="mid-btn" href="register.html">Register</a>
    </div>
  </nav>

  <!-- Body -->
  <div class="d-flex flex-grow-1">

    <!-- Sidebar -->
    <aside>
      <nav>
        <a class="side-link" href="home.html">Home</a>
        <a class="side-link" href="artworks.html">Artworks</a>
      </nav>
    </aside>

    <!-- Payment -->
    <main class="d-flex justify-content-center p-4 flex-grow-1">
      <div style="width:100%;max-width:500px">
        <h1>Payment details</h1>

        <div class="pay-tabs">
          <div class="pay-tab active">Credit card</div>
          <div class="pay-tab">PayPal</div>
          <div class="pay-tab">Bank transfer</div>
        </div>

        <div id="card-fields">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Cardholder name</label>
            <input class="form-control" type="text" placeholder="Willem Dafoe"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Card number</label>
            <input class="form-control" type="text" placeholder="1234 1234 1234 1234"
                   maxlength="19"/>
          </div>
          <div class="row g-3 mb-4">
            <div class="col-6">
              <label class="form-label small fw-semibold">Expiry date</label>
              <input class="form-control" type="text" placeholder="MM/YY"
                     maxlength="5"/>
            </div>
            <div class="col-6">
              <label class="form-label small fw-semibold">CVV</label>
              <input class="form-control" type="password" placeholder="•••" maxlength="3"/>
            </div>
          </div>
        </div>

        <a class="btn btn-dark w-100 py-2" href="home.html" style="font-size:15px">Confirm payment: 4 579€</a>

        <div class="mt-3">
          <a href="cart_shipping.html" style="font-size:13px; color:var(--muted); text-decoration:none;">Back to shipping</a>
        </div>

      </div>
    </main>

  </div>

  <!-- Footer -->
  <footer class="d-flex align-items-center gap-3 py-3 border-top" style="background:var(--card-bg); padding-left:1.5rem; padding-right:1.5rem">
    <div class="d-flex gap-3">
      <a href="#" class="opacity-50"><img src="../icons/twitter.svg" alt="Twitter" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/instagram.svg" alt="Instagram" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/youtube.svg" alt="YouTube" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/linkedin.svg" alt="LinkedIn" style="width:15px; height:15px"/></a>
    </div>
    <p class="mb-0 text-muted small">© 2026 DSgallery. All rights reserved.</p>
  </footer>

</body>
</html>
