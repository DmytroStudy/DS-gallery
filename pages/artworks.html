<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSgallery: artworks</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="d-flex flex-column" style="min-height:100vh">

  <!-- Header -->
  <nav class="navbar px-4 py-2 border-bottom sticky-top bg-white d-flex justify-content-between">
    <a href="home.html"><img src="../images/home/logo.png" alt="DSgallery" style="max-height:40px"/></a>
    <div class="d-flex align-items-center gap-2">
      <div class="search-wrap">
        <input type="text" placeholder="Search"/>
        <img class="icon-search" src="../icons/search.svg" alt=""/>
      </div>
      <a class="mid-icon-btn" href="cart.html"><img src="../icons/cart.svg" alt="Cart"/></a>
      <a class="mid-icon-btn" href="saved.html"><img src="../icons/bookmark.svg" alt="Saved"/></a>
      <a class="mid-btn" href="login.html">Log in</a>
      <a class="mid-btn" href="register.html">Register</a>
    </div>
  </nav>

  <!-- Body -->
  <div class="d-flex flex-grow-1 ">

    <!-- Sidebar -->
    <aside>
      <nav>
        <a class="side-link" href="home.html">Home</a>
        <a class="side-link active" href="admin_artworks.html">Artworks</a>
      </nav>
    </aside>

    <!-- Artworks -->
    <div class="d-flex flex-grow-1">

      <!-- Filter panel -->
      <div class="d-flex flex-column flex-md-row flex-grow-1">
        <div class="filter-panel w-100 w-md-auto">

          <p class="muted-label">SORT BY</p>
          <select class="form-select" style="font-size:13px">
            <option>Price</option>
            <option>Year</option>
            <option>Name</option>
          </select>

          <p class="muted-label">PRICE</p>
          <div class="d-flex justify-content-between" style="font-size:11px; color:var(--muted)">
            <span>0€</span>
            <span>1000€</span>
          </div>

          <input type="range" min="0" max="1000" value="1000" class="w-100"/>

          <p class="muted-label">YEAR</p>
          <div class="d-flex justify-content-between" style="font-size:11px;color:var(--muted)">
            <span>1200</span>
            <span>2026</span>
          </div>
          <input type="range" min="1200" max="2026" value="2026" class="w-100"/>

          <p class="muted-label">GENRE</p>
          <div class="filter-check">
            <label><input type="checkbox" checked/>Impressionism</label>
            <label><input type="checkbox" checked/>Renaissance</label>
            <label><input type="checkbox" checked/>Abstract</label>
          </div>
        </div>
      </div>

      <!-- Product grid -->
      <div class="mx-auto">
        <main class="aw-main p-4" style="overflow-y: auto; flex: 1;">

          <h1>Artworks</h1>

          <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">

            <div class="col">
              <figure class="card p-0">
                <a class="img-card" style="height:300px" href="detail.html">
                  <img class="art-image" src="../images/art/van_gogh/Bridges_across_the_Seine_at_Asnieres.jpg" alt=""/>
                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>
                    <button class="sm-icon-btn"><img src="../icons/bookmark.svg" alt=""/></button>
                  </div>
                </a>
                <div class="tile-info">
                  <figcaption class="name">Bridges Across the Seine at Asnières</figcaption>
                  <div class="price">879€</div>
                </div>
              </figure>
            </div>

            <div class="col">
              <figure class="card p-0">
                <a class="img-card" style="height:300px" href="detail.html">
                  <img class="art-image" src="../images/art/van_gogh/Cafe_Terrace_at_Night.jpg" alt=""/>
                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>
                    <button class="sm-icon-btn"><img src="../icons/bookmark.svg" alt=""/></button>
                  </div>
                </a>
                <div class="tile-info">
                  <figcaption class="name">Café Terrace at Night</figcaption>
                  <div class="price">950€</div>
                </div>
              </figure>
            </div>

            <div class="col">
              <figure class="card p-0">
                <a class="img-card" style="height:300px" href="detail.html">
                  <img class="art-image" src="../images/art/van_gogh/Fishing_in_the_Spring.jpg" alt=""/>
                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>
                    <button class="sm-icon-btn"><img src="../icons/bookmark.svg" alt=""/></button>
                  </div>
                </a>
                <div class="tile-info">
                  <figcaption class="name">Fishing in the Spring</figcaption>
                  <div class="price">880€</div>

            <div class="col">
              <figure class="card p-0">

                  <div class="tile-btns">

                <div class="tile-info">

                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>
                    <button class="sm-icon-btn"><img src="../icons/bookmark.svg" alt=""/></button>
                  </div>
                </a>
                <div class="tile-info">
                  <figcaption class="name">Irises</figcaption>
                  <div class="price">990€</div>
                </div>
              </figure>
            </div>

            <div class="col">
              <figure class="card p-0">
                <a class="img-card" style="height:300px" href="detail.html">
                  <img class="art-image" src="../images/art/van_gogh/Landscape_with_House_and_Ploughman.jpg" alt=""/>
                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>
                    <button class="sm-icon-btn"><img src="../icons/bookmark.svg" alt=""/></button>

                  <figcaption class="name">Landscape with House and Ploughman</figcaption>

            <div class="col">
              <figure class="card p-0">
                <a class="img-card" style="height:300px" href="detail.html">
                  <img class="art-image" src="../images/art/van_gogh/Red_Vineyards_at_Arles.jpg" alt=""/>
                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>

                </a>
                <div class="tile-info">
                  <figcaption class="name">Red Vineyards at Arles</figcaption>
                  <div class="price">950€</div>

              </figure>
            </div>

            <div class="col">
              <figure class="card p-0">

                  <div class="tile-btns">
                    <button class="sm-icon-btn"><img src="../icons/cart.svg" alt=""/></button>

                  <figcaption class="name">Skull with Burning Cigarette</figcaption>

          </div>

          <!-- Pagination -->
          <nav class="d-flex justify-content-center mt-4">
            <ul class="pagination">
              <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
              <li class="page-item active"><a class="page-link" href="#">1</a></li>
              <li class="page-item"><a class="page-link" href="#">2</a></li>

        </main>

    </div>

  </div>

  <!-- Footer -->
  <footer class="d-flex align-items-center gap-3 py-3 border-top" style="background:var(--card-bg); padding-left:1.5rem; padding-right:1.5rem">
    <div class="d-flex gap-3">
      <a href="#" class="opacity-50"><img src="../icons/twitter.svg" alt="Twitter" style="width:15px; height:15px"/></a>

  </footer>

</html>
