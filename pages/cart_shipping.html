<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSgallery: cart_shipping</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="d-flex flex-column" style="min-height:100vh">

  <!-- Header -->
  <nav class="navbar px-4 py-2 border-bottom sticky-top bg-white d-flex justify-content-between">
    <a href="home.html"><img src="../images/home/logo.png" alt="DSgallery" style="max-height:40px"/></a>
    <div class="d-flex align-items-center gap-2">
      <div class="search-wrap">
        <input type="text" placeholder="Search"/>
        <img class="icon-search" src="../icons/search.svg" alt=""/>
      </div>
      <a class="mid-icon-btn" href="cart.html"><img src="../icons/cart.svg" alt="Cart"/></a>
      <a class="mid-icon-btn" href="saved.html"><img src="../icons/bookmark.svg" alt="Saved"/></a>
      <a class="mid-btn" href="login.html">Log in</a>
      <a class="mid-btn" href="register.html">Register</a>
    </div>
  </nav>

  <!-- Body -->
  <div class="d-flex flex-grow-1">

    <!-- Sidebar -->
    <aside>
      <nav>
        <a class="side-link" href="home.html">Home</a>
        <a class="side-link" href="artworks.html">Artworks</a>
      </nav>
    </aside>

    <!-- Shipping -->
    <main class="d-flex justify-content-center p-4 flex-grow-1 overflow-y-auto">
      <div style="width:100%;max-width:500px">

        <h1 class="mb-3">Shipping information</h1>

        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label small fw-semibold">First Name</label>
            <input class="form-control" type="text" placeholder="Willem"/>
          </div>
          <div class="col-6">
            <label class="form-label small fw-semibold">Last Name</label>
            <input class="form-control" type="text" placeholder="Dafoe"/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Email</label>
          <input class="form-control" type="email" placeholder="email@example.com"/>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Phone</label>
          <input class="form-control" type="tel" placeholder="+421 900 000 000"/>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-semibold">Country</label>
          <select class="form-select">
            <option>Select country</option>
            <option>Slovakia</option>
            <option>Czech Republic</option>
            <option>Austria</option>
            <option>Germany</option>
            <option>Hungary</option>
          </select>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-8">
            <label class="form-label small fw-semibold">City</label>
            <input class="form-control" type="text" placeholder="Bratislava"/>
          </div>
          <div class="col-4">
            <label class="form-label small fw-semibold">Postal code</label>
            <input class="form-control" type="text" placeholder="81101"/>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-semibold">Street address</label>
          <input class="form-control mb-2" type="text" placeholder="Street and house number"/>
          <input class="form-control" type="text" placeholder="Apartment, floor (optional)"/>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <a href="cart.html" style="font-size:13px; color:var(--muted); text-decoration:none;">Back to cart</a>
          <a class="btn btn-dark px-4" href="cart_payment.html">Continue to payment</a>
        </div>

      </div>
    </main>
  </div>

  <!-- Footer -->
  <footer class="d-flex align-items-center gap-3 py-3 border-top" style="background:var(--card-bg); padding-left:1.5rem; padding-right:1.5rem">
    <div class="d-flex gap-3">
      <a href="#" class="opacity-50"><img src="../icons/twitter.svg" alt="Twitter" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/instagram.svg" alt="Instagram" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/youtube.svg" alt="YouTube" style="width:15px; height:15px"/></a>
      <a href="#" class="opacity-50"><img src="../icons/linkedin.svg" alt="LinkedIn" style="width:15px; height:15px"/></a>
    </div>
    <p class="mb-0 text-muted small">© 2026 DSgallery. All rights reserved.</p>
  </footer>

</body>
</html>
